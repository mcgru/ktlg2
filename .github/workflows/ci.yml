name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CRYSTAL_VERSION: latest

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ env.CRYSTAL_VERSION }}
      - run: crystal tool format --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ env.CRYSTAL_VERSION }}
      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: lib
          key: shards-${{ runner.os }}-${{ hashFiles('shard.lock') }}
      - run: shards install
      - run: crystal build -Dpreview_mt -o bin/ameba lib/ameba/bin/ameba.cr
      - run: bin/ameba

  test:
    needs: [format, lint]
    strategy:
      fail-fast: false
      matrix:
        crystal: [latest, "1.15", "1.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: lib
          key: shards-${{ matrix.crystal }}-${{ hashFiles('shard.lock') }}
      - run: shards install
      - run: crystal spec

  build:
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ env.CRYSTAL_VERSION }}
      - run: shards install
      - run: crystal build src/main.cr --release -o bin/ktlg2
      - uses: actions/upload-artifact@v4
        with:
          name: ktlg2-x86_64-linux
          path: bin/ktlg2
